services:
  # ============================================
  # 1. PostgreSQL + pgvector
  # ============================================
  db:
    image: pgvector/pgvector:pg16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-123}
      POSTGRES_DB: ${DB_NAME:-nest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebook-network
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nest}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================
  # 2. Redis
  # ============================================
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - ebook-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # 3. NestJS API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3005}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LANGGRAPH_TS_URL: ${LANGGRAPH_TS_URL}
      PYTHON_AGENT_URL: ${PYTHON_AGENT_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ebook-network
    restart: unless-stopped

  # ============================================
  # 4. LangGraph TS Agent
  # ============================================
  ai-agent-ts:
    build:
      context: .
      dockerfile: Dockerfile.agent
    expose:
      - '8123'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    depends_on:
      - api
    networks:
      - ebook-network
    restart: unless-stopped

  # ============================================
  # 5. Python AI Agent v1 (port 8000)
  # ============================================
  ai-agent-python:
    build:
      context: ./ai-agent-python
      dockerfile: Dockerfile
    expose:
      - '8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LANGGRAPH_FAST_API: ${LANGGRAPH_FAST_API}
      PORT: 8000
    depends_on:
      - api
    networks:
      - ebook-network
    restart: unless-stopped

  # ============================================
  # 6. Python AI Agent v2 (port 8001) - test flow mới
  # ============================================
  ai-agent-python-v2:
    build:
      context: ./ai-agent-python-v2
      dockerfile: Dockerfile
    expose:
      - '8001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LANGGRAPH_FAST_API: ${LANGGRAPH_FAST_API}
      PORT: 8001
    depends_on:
      - api
    networks:
      - ebook-network
    restart: unless-stopped

  # ============================================
  # 7. Agent Server (Hono + CopilotKit) - port 3001
  # ============================================
  agent-server:
    build:
      context: ./agent-server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      LANGGRAPH_TS_URL: http://ai-agent-ts:8123
      PYTHON_AGENT_URL: http://ai-agent-python:8000/book-agent
      PYTHON_AGENT_V2_URL: http://ai-agent-python-v2:8001/book-agent
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USE_PYTHON_V2: ${USE_PYTHON_V2}
    depends_on:
      - ai-agent-ts
      - ai-agent-python
      - ai-agent-python-v2
    networks:
      - ebook-network
    restart: unless-stopped

networks:
  ebook-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
