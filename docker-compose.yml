version: '3.8'

services:
  # 1. Database PostgreSQL + pgvector
  test-db:
    image: pgvector/pgvector:pg13
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-123}
      POSTGRES_DB: ${DB_NAME:-nest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebook-network
    restart: unless-stopped

  # 2. Redis
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - ebook-network
    restart: unless-stopped

  # 3. NestJS Backend (API-EBook)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3005:3000'
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - test-db
      - redis
    networks:
      - ebook-network
    restart: unless-stopped

  # 4. LangGraph JS Agent
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - '8123:8123'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # URL gọi sang Ollama ở máy chính qua Tailscale
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    networks:
      - ebook-network
    restart: unless-stopped

  # 5. Python AI Agent (Uvicorn)
  ai-agent-python:
    build:
      context: ./ai-agent-python
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - LANGGRAPH_FAST_API=${LANGGRAPH_FAST_API}
    networks:
      - ebook-network
    restart: unless-stopped

networks:
  ebook-network:

volumes:
  postgres_data:
  redis_data:
