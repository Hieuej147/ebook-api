services:
  # 1. Database PostgreSQL + pgvector
  test-db:
    image: pgvector/pgvector:pg13
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-123}
      POSTGRES_DB: ${DB_NAME:-nest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebook-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - ebook-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. NestJS Backend (API-EBook)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    environment:
      - RUN_MIGRATIONS=true # Kích hoạt chạy migration deploy qua entrypoint
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      test-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ebook-network
    restart: unless-stopped

  # 4. LangGraph TS Agent
  ai-agent-ts:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/agent-ts
    ports:
      - '8123:8123'
    command: npx @langchain/langgraph-cli dev --host 0.0.0.0 --port 8123 --no-browser
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    depends_on:
      - api
    networks:
      - ebook-network
    restart: unless-stopped

  # 5. Python AI Agent
  ai-agent-python:
    build:
      context: ./ai-agent-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - LANGGRAPH_FAST_API=${LANGGRAPH_FAST_API}
    networks:
      - ebook-network
    restart: unless-stopped

networks:
  ebook-network:

volumes:
  postgres_data:
  redis_data: